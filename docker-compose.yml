services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobfit-postgres
    environment:
      POSTGRES_DB: jobfit
      POSTGRES_USER: jobfit
      POSTGRES_PASSWORD: jobfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/create_pgvector_extension.sql:/docker-entrypoint-initdb.d/01-create-pgvector-extension.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobfit -d jobfit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: jobfit-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobfit:jobfit@postgres:5432/jobfit
      SYNC_DATABASE_URL: postgresql+psycopg://jobfit:jobfit@postgres:5432/jobfit
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: jobfit-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
  frontend_node_modules:
